# =============================================================================
# Release — Build, Tag, and Publish Container Images & Packages
# =============================================================================
# Triggered when a git tag matching `v*` (e.g. v1.2.0) is pushed. Builds the
# multi-arch container image and pushes it to GitHub Container Registry
# (ghcr.io) with semantic version tags. Also packages the Helm chart and
# attaches RPM/DEB packages and the Helm chart archive to the GitHub Release.
#
# Job dependency graph:
#
#   extract-version (instant)
#     ├── build-image ──────┐
#     ├── build-packages ───┤
#     ├── build-archives ───┼── release
#     └── package-helm ─────┘
#
# All build jobs run in parallel. Only the final release job waits for all.
#
# Image tag strategy (for a tag like v1.2.3):
#   - 1.2.3       immutable release tag
#   - 1.2         floating minor tag, updated on each patch release
#   - 1           floating major tag
#   - latest      most recent stable release
#   - <commit-sha> full commit SHA for traceability
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*"

# Only one release workflow at a time
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Extract Version (lightweight — unblocks all other jobs immediately)
  # ---------------------------------------------------------------------------
  extract-version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          # Strip the leading 'v' from the tag (v1.2.3 -> 1.2.3)
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

  # ---------------------------------------------------------------------------
  # Build and Push Container Image
  # ---------------------------------------------------------------------------
  # NOTE: Lint and test jobs are handled by ci.yml which runs on every push
  # to main. Tags are only created on main, so CI has already passed for
  # the tagged commit. No need to duplicate that work here.
  # ---------------------------------------------------------------------------
  build-image:
    name: Build and Push Container Image
    runs-on: ubuntu-latest
    needs: [extract-version]
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Immutable version tag: 1.2.3
            type=semver,pattern={{version}}
            # Floating minor tag: 1.2
            type=semver,pattern={{major}}.{{minor}}
            # Floating major tag: 1
            type=semver,pattern={{major}}
            # latest
            type=raw,value=latest
            # Full commit SHA for traceability
            type=sha,prefix=,format=long
          labels: |
            org.opencontainers.image.title=chef-migration-metrics
            org.opencontainers.image.description=Tool for planning and tracking Chef Client upgrade projects
            org.opencontainers.image.version=${{ needs.extract-version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.extract-version.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Package Helm Chart
  # ---------------------------------------------------------------------------
  package-helm:
    name: Package Helm Chart
    runs-on: ubuntu-latest
    needs: [extract-version]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Chart appVersion
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" deploy/helm/chef-migration-metrics/Chart.yaml
          echo "Updated Chart.yaml appVersion to ${VERSION}"
          cat deploy/helm/chef-migration-metrics/Chart.yaml

      - name: Package Helm chart
        run: |
          helm package deploy/helm/chef-migration-metrics --destination .helm-packages/

      - name: Log in to GHCR for Helm OCI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Push Helm chart to OCI registry
        run: |
          for pkg in .helm-packages/*.tgz; do
            helm push "${pkg}" oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts
          done

      - name: Upload Helm chart as artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: .helm-packages/*.tgz

  # ---------------------------------------------------------------------------
  # Build Native Packages (RPM / DEB)
  # ---------------------------------------------------------------------------
  build-packages:
    name: Build ${{ matrix.format }} (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: [extract-version]
    strategy:
      matrix:
        arch: [amd64, arm64]
        format: [rpm, deb]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/package.json
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up QEMU (for cross-compilation)
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Install nFPM
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build Go binary
        env:
          VERSION: ${{ needs.extract-version.outputs.version }}
          GIT_COMMIT: ${{ github.sha }}
        run: |
          GOARCH=${{ matrix.arch }} CGO_ENABLED=0 GOOS=linux go build \
            -ldflags "-X main.version=${VERSION} -X main.commit=${GIT_COMMIT} -X main.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o build/chef-migration-metrics ./cmd/chef-migration-metrics/

      - name: Build embedded Ruby environment
        run: |
          make build-embedded-${{ matrix.arch }}

      - name: Build ${{ matrix.format }} package
        env:
          VERSION: ${{ needs.extract-version.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          nfpm package --packager ${{ matrix.format }} --target build/

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.format }}-${{ matrix.arch }}
          path: |
            build/*.${{ matrix.format }}

  # ---------------------------------------------------------------------------
  # Build Distribution Archives (tar.gz / zip)
  # ---------------------------------------------------------------------------
  build-archives:
    name: Build archive (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [extract-version]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/package.json
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build Go binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY_NAME=chef-migration-metrics
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          go build \
            -ldflags "-X main.version=${{ needs.extract-version.outputs.version }} -X main.commit=${{ github.sha }} -X main.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "build/${BINARY_NAME}" ./cmd/chef-migration-metrics/

      - name: Create distribution archive
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          ARCHIVE_NAME="chef-migration-metrics-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "staging/${ARCHIVE_NAME}"

          # Copy binary
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cp build/chef-migration-metrics.exe "staging/${ARCHIVE_NAME}/chef-migration-metrics.exe"
          else
            cp build/chef-migration-metrics "staging/${ARCHIVE_NAME}/chef-migration-metrics"
          fi

          # Bundle supporting files
          cp deploy/pkg/config.yml.example "staging/${ARCHIVE_NAME}/config.yml.example"
          cp README.md LICENSE "staging/${ARCHIVE_NAME}/"

          # Create archive
          mkdir -p build/archives
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd staging && zip -rq "../build/archives/${ARCHIVE_NAME}.zip" "${ARCHIVE_NAME}")
          else
            tar -czf "build/archives/${ARCHIVE_NAME}.tar.gz" -C staging "${ARCHIVE_NAME}"
          fi

          echo "Created archive:"
          ls -lh build/archives/

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: archive-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/archives/*

  # ---------------------------------------------------------------------------
  # Create GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [extract-version, build-image, build-packages, build-archives, package-helm]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: false

      - name: Collect release assets
        id: collect
        run: |
          mkdir -p release-files
          # Collect RPM and DEB packages
          find release-assets -name '*.rpm' -o -name '*.deb' | while read f; do
            cp "$f" release-files/
          done
          # Collect distribution archives (tar.gz and zip)
          find release-assets -name '*.tar.gz' -o -name '*.zip' | while read f; do
            cp "$f" release-files/
          done
          # Collect Helm chart archives
          find release-assets -name '*.tgz' | while read f; do
            cp "$f" release-files/
          done
          echo "Collected release files:"
          ls -la release-files/

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          DIGEST="${{ needs.build-image.outputs.digest }}"
          cat <<EOF > release-notes.md
          ## Container Image

          \`\`\`
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}
          \`\`\`

          **Digest:** \`${DIGEST}\`

          **Supported platforms:** \`linux/amd64\`, \`linux/arm64\`

          ### Available Tags

          | Tag | Value |
          |-----|-------|
          | Version | \`${VERSION}\` |
          | Commit | \`${{ github.sha }}\` |
          | Latest | \`latest\` |

          ## Helm Chart

          \`\`\`bash
          helm install chef-migration-metrics oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/chef-migration-metrics --version ${VERSION}
          \`\`\`

          ## Distribution Archives

          Pre-built binaries bundled with example configuration, README, and LICENSE:

          | Platform | Architecture | Archive |
          |----------|-------------|---------|
          | Linux | amd64 | \`chef-migration-metrics-${VERSION}-linux-amd64.tar.gz\` |
          | Linux | arm64 | \`chef-migration-metrics-${VERSION}-linux-arm64.tar.gz\` |
          | macOS | amd64 (Intel) | \`chef-migration-metrics-${VERSION}-darwin-amd64.tar.gz\` |
          | macOS | arm64 (Apple Silicon) | \`chef-migration-metrics-${VERSION}-darwin-arm64.tar.gz\` |
          | Windows | amd64 | \`chef-migration-metrics-${VERSION}-windows-amd64.zip\` |
          | Windows | arm64 | \`chef-migration-metrics-${VERSION}-windows-arm64.zip\` |

          ## Native Packages

          RPM and DEB packages for \`amd64\` and \`arm64\` are attached below.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: release-files/*
          fail_on_unmatched_files: false
