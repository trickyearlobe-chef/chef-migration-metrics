# =============================================================================
# CI — Lint and Test (Pull Request Quality Gate)
# =============================================================================
# Runs on pull requests targeting main. Provides a confidence check before
# merging. Builds and releases are handled by the Release workflow when a
# version tag is pushed.
# =============================================================================

name: CI

on:
  pull_request:
    branches:
      - main

# Cancel in-progress runs for the same PR to save resources
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Create placeholder frontend dist (for go:embed)
        run: |
          mkdir -p frontend/dist
          echo '<!DOCTYPE html><html><head><title>placeholder</title></head><body></body></html>' > frontend/dist/index.html

      - name: Install and run golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          golangci-lint run ./...

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/package.json
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Lint frontend
        working-directory: frontend
        run: |
          npm ci
          npm run lint

      - name: Lint Helm chart
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm dependency build deploy/helm/chef-migration-metrics
          helm lint deploy/helm/chef-migration-metrics

  # ---------------------------------------------------------------------------
  # Test
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Create placeholder frontend dist (for go:embed)
        run: |
          mkdir -p frontend/dist
          echo '<!DOCTYPE html><html><head><title>placeholder</title></head><body></body></html>' > frontend/dist/index.html

      - name: Run Go tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/package.json
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run frontend tests
        working-directory: frontend
        run: |
          npm ci
          npm test -- --coverage

  # ---------------------------------------------------------------------------
  # Security
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Create placeholder frontend dist (for go:embed)
        run: |
          mkdir -p frontend/dist
          echo '<!DOCTYPE html><html><head><title>placeholder</title></head><body></body></html>' > frontend/dist/index.html

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/package.json
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run npm audit
        working-directory: frontend
        run: |
          npm ci
          npm audit
