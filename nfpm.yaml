# =============================================================================
# nFPM Configuration — Chef Migration Metrics
# =============================================================================
# Builds both RPM and DEB packages from a single configuration file.
# Environment variables VERSION and ARCH are injected by the Makefile.
#
# Usage (via Makefile):
#   make package-rpm
#   make package-deb
#   make package-all
#
# Direct usage:
#   VERSION=1.2.3 ARCH=amd64 nfpm package --packager rpm --target build/
#   VERSION=1.2.3 ARCH=amd64 nfpm package --packager deb --target build/
#
# See: .claude/specifications/packaging/Specification.md § 9
# yaml-language-server: $schema=https://nfpm.goreleaser.com/schema.json
# =============================================================================

name: chef-migration-metrics
arch: ${ARCH}
platform: linux
version: ${VERSION}
release: "1"
section: admin
priority: optional
maintainer: Project Maintainers
description: Tool for planning and tracking Chef Client upgrade projects
vendor: Chef Migration Metrics Project
homepage: https://github.com/trickyearlobe-chef/chef-migration-metrics
license: Apache-2.0

depends:
  - git

recommends:
  - chef-workstation

contents:
  # Go binary
  - src: ./build/chef-migration-metrics
    dst: /usr/bin/chef-migration-metrics
    file_info:
      mode: 0755

  # Main configuration file — config|noreplace ensures RPM/DEB never
  # overwrite the operator's edits. On fresh install the example content
  # is laid down; on upgrade the existing file is left untouched.
  #
  # IMPORTANT: this path MUST stay in the package across versions.
  # If it is ever removed from contents, RPM treats it as an obsolete
  # file and deletes it during upgrade (even with noreplace on the old
  # package). That was the root cause of the config-clobbering bug.
  - src: ./deploy/pkg/config.yml.example
    dst: /etc/chef-migration-metrics/config.yml
    type: config|noreplace
    file_info:
      mode: 0640

  # Example / reference copy — always replaced on upgrade so operators
  # can diff against the latest defaults.
  - src: ./deploy/pkg/config.yml.example
    dst: /etc/chef-migration-metrics/config.yml.example
    file_info:
      mode: 0640

  # Chef API private keys directory (mounted/populated by operator)
  - dst: /etc/chef-migration-metrics/keys/
    type: dir
    file_info:
      mode: 0700

  # Runtime data directory (git working dirs, etc.)
  - dst: /var/lib/chef-migration-metrics/
    type: dir
    file_info:
      mode: 0750

  # Application log directory
  - dst: /var/log/chef-migration-metrics/
    type: dir
    file_info:
      mode: 0750

  # systemd unit file
  - src: ./deploy/pkg/chef-migration-metrics.service
    dst: /usr/lib/systemd/system/chef-migration-metrics.service
    file_info:
      mode: 0644

  # Environment file — Debian convention (/etc/default/)
  - src: ./deploy/pkg/env-file
    dst: /etc/default/chef-migration-metrics
    type: config|noreplace
    file_info:
      mode: 0640
    packager: deb

  # Environment file — RPM convention (/etc/sysconfig/)
  - src: ./deploy/pkg/env-file
    dst: /etc/sysconfig/chef-migration-metrics
    type: config|noreplace
    file_info:
      mode: 0640
    packager: rpm

scripts:
  preinstall: ./deploy/pkg/scripts/preinstall.sh
  postinstall: ./deploy/pkg/scripts/postinstall.sh
  preremove: ./deploy/pkg/scripts/preremove.sh

rpm:
  group: Applications/System

deb:
  predepends:
    - adduser
