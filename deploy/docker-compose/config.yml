# =============================================================================
# Chef Migration Metrics — Example Configuration (Docker Compose)
# =============================================================================
# This file is mounted into the application container at
# /etc/chef-migration-metrics/config.yml. Edit it for your environment.
#
# The DATABASE_URL is injected via environment variable by Docker Compose
# (see docker-compose.yml), so no datastore section is needed here.
# =============================================================================

# ---------------------------------------------------------------------------
# Chef Server Organisations
# ---------------------------------------------------------------------------
# Add one entry per Chef Infra Server organisation you want to collect from.
# Place the corresponding .pem key files in the ./keys/ directory.
organisations:
  - name: my-org
    chef_server_url: https://chef.example.com
    org_name: my-org
    client_name: chef-migration-metrics
    client_key_path: /etc/chef-migration-metrics/keys/my-org.pem
    # ssl_verify: true          # Set to false to skip TLS certificate verification
                                 # (e.g. for self-signed certs). Default: true.

  # Additional organisations:
  # - name: my-other-org
  #   chef_server_url: https://chef.example.com
  #   org_name: my-other-org
  #   client_name: chef-migration-metrics
  #   client_key_path: /etc/chef-migration-metrics/keys/my-other-org.pem
  #   ssl_verify: false          # Disable TLS verification for this org

  # Database-stored key (requires CMM_CREDENTIAL_ENCRYPTION_KEY env var):
  # - name: staging
  #   chef_server_url: https://chef.example.com
  #   org_name: staging
  #   client_name: chef-migration-metrics
  #   client_key_credential: staging-key

# ---------------------------------------------------------------------------
# Target Chef Client Versions
# ---------------------------------------------------------------------------
# The versions of Chef Infra Client you are upgrading to. Cookbook compatibility
# is tested against each version listed here.
target_chef_versions:
  - "18.5.0"
  # - "19.0.0"

# ---------------------------------------------------------------------------
# Git Base URLs (optional)
# ---------------------------------------------------------------------------
# If your cookbooks are in git repositories, list the base URLs here.
# The collector tries each base URL when looking for a cookbook's repo.
# git_base_urls:
#   - https://github.com/my-org
#   - https://gitlab.example.com/chef-cookbooks

# ---------------------------------------------------------------------------
# Collection Schedule
# ---------------------------------------------------------------------------
collection:
  # Cron expression — default: every hour at minute 0.
  schedule: "0 * * * *"
  stale_node_threshold_days: 7
  stale_cookbook_threshold_days: 365

# ---------------------------------------------------------------------------
# Concurrency
# ---------------------------------------------------------------------------
concurrency:
  organisation_collection: 5
  node_page_fetching: 10
  git_pull: 10
  cookstyle_scan: 8
  test_kitchen_run: 4
  readiness_evaluation: 20

# ---------------------------------------------------------------------------
# Readiness
# ---------------------------------------------------------------------------
readiness:
  min_free_disk_mb: 2048

# ---------------------------------------------------------------------------
# Analysis Tools
# ---------------------------------------------------------------------------
# The container image ships CookStyle and Test Kitchen under the embedded
# prefix. If you are running a locally-built binary outside Docker, point
# this to your own embedded directory or leave it empty to use PATH lookup.
analysis_tools:
  embedded_bin_dir: /opt/chef-migration-metrics/embedded/bin
  # cookstyle_enabled: true     # Set to false to disable CookStyle scanning
                                 # even when the cookstyle binary is available.
  cookstyle_timeout_minutes: 10
  test_kitchen_timeout_minutes: 30

# ---------------------------------------------------------------------------
# Web Server
# ---------------------------------------------------------------------------
server:
  listen_address: "0.0.0.0"
  port: 8080
  tls:
    mode: "off"
  websocket:
    enabled: true
    max_connections: 100
    send_buffer_size: 64
    write_timeout_seconds: 10
    ping_interval_seconds: 30
    pong_timeout_seconds: 60
  graceful_shutdown_seconds: 30

# ---------------------------------------------------------------------------
# Frontend
# ---------------------------------------------------------------------------
frontend:
  base_path: "/"

