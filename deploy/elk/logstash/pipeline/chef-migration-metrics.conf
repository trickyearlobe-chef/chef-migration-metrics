# Logstash pipeline for Chef Migration Metrics
#
# Reads NDJSON files produced by the application's Elasticsearch export,
# parses each line as a JSON document, and indexes all document types into
# a single Elasticsearch index (chef-migration-metrics).
#
# Document structure:
#   All fields are top-level (flat) — there is no nested `data` wrapper.
#   Every document includes `doc_type`, `doc_id`, `@timestamp`,
#   `organisation_name`, and `exported_at` as common envelope fields.
#   Type-specific fields sit alongside these at the top level.
#
# Document types:
#   node_snapshot, cookbook, cookstyle_result, cookstyle_offense,
#   test_kitchen_result, cookbook_complexity, node_readiness,
#   role_dependency, metric_snapshot, autocorrect_preview
#
# The application sets `@timestamp` on every document to the most
# semantically meaningful time for that document type (e.g. collected_at
# for node snapshots, scanned_at for CookStyle results). This pipeline
# preserves that value — it does NOT overwrite it with ingestion time.
#
# File lifecycle:
#   1. The application writes files with a `.tmp` suffix while writing.
#   2. Once complete, it atomically renames to `.ndjson`.
#   3. This pipeline only reads `*.ndjson` files (excluding `.tmp`).
#   4. sincedb tracking prevents reprocessing after Logstash restarts.

input {
  file {
    path => "${LOGSTASH_INPUT_DIR:/var/lib/chef-migration-metrics/elasticsearch}/*.ndjson"
    exclude => "*.tmp"
    mode => "tail"
    start_position => "beginning"
    sincedb_path => "${LOGSTASH_SINCEDB_PATH:/usr/share/logstash/data/plugins/inputs/file/sincedb_chef_migration_metrics}"
    sincedb_write_interval => 5
    codec => "json_lines"
    discover_interval => 5
    stat_interval => 1
    file_completed_action => "log"
    file_completed_log_path => "/dev/null"
  }
}

filter {
  # ── Envelope validation ────────────────────────────────────────────
  # Drop documents missing required envelope fields.
  if ![doc_type] or ![doc_id] {
    drop {
      tag => "_missing_envelope_fields"
    }
  }

  # ── Metadata extraction ────────────────────────────────────────────
  # Copy doc_id for use as the Elasticsearch _id.
  mutate {
    copy => { "doc_id" => "[@metadata][_id]" }
    copy => { "doc_type" => "[@metadata][doc_type]" }
  }

  # ── @timestamp preservation ────────────────────────────────────────
  # The application sets @timestamp to the semantically correct time for
  # each document type. Parse it as a proper date object but do NOT
  # replace it with the Logstash ingestion time.
  if [@timestamp] {
    date {
      match => ["@timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

  # ── Date field parsing ─────────────────────────────────────────────
  # Parse all ISO 8601 date strings into proper Elasticsearch date types.
  # Fields are top-level (flat structure, no `data.*` prefix).

  if [exported_at] {
    date {
      match => ["exported_at", "ISO8601"]
      target => "exported_at"
    }
  }

  if [collected_at] {
    date {
      match => ["collected_at", "ISO8601"]
      target => "collected_at"
    }
  }

  if [scanned_at] {
    date {
      match => ["scanned_at", "ISO8601"]
      target => "scanned_at"
    }
  }

  if [started_at] {
    date {
      match => ["started_at", "ISO8601"]
      target => "started_at"
    }
  }

  if [completed_at] {
    date {
      match => ["completed_at", "ISO8601"]
      target => "completed_at"
    }
  }

  if [evaluated_at] {
    date {
      match => ["evaluated_at", "ISO8601"]
      target => "evaluated_at"
    }
  }

  if [snapshot_at] {
    date {
      match => ["snapshot_at", "ISO8601"]
      target => "snapshot_at"
    }
  }

  if [first_seen_at] {
    date {
      match => ["first_seen_at", "ISO8601"]
      target => "first_seen_at"
    }
  }

  if [last_fetched_at] {
    date {
      match => ["last_fetched_at", "ISO8601"]
      target => "last_fetched_at"
    }
  }

  if [generated_at] {
    date {
      match => ["generated_at", "ISO8601"]
      target => "generated_at"
    }
  }

  # ── Cleanup ────────────────────────────────────────────────────────
  # Remove Logstash-internal fields that should not be indexed.
  mutate {
    remove_field => ["@version", "host", "path", "log"]
  }
}

output {
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOSTS:http://elasticsearch:9200}"]
    index => "${ELASTICSEARCH_INDEX:chef-migration-metrics}"
    document_id => "%{[@metadata][_id]}"
    action => "index"
    manage_template => true
    template_name => "chef-migration-metrics"
    template_overwrite => true
    template => "/usr/share/logstash/pipeline/chef-migration-metrics-template.json"
    ilm_enabled => false
  }

  # Uncomment for debugging — logs each document to stdout
  # stdout {
  #   codec => dots
  # }
}
