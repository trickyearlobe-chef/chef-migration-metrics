apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "chef-migration-metrics.fullname" . }}-test-connection"
  labels:
    {{- include "chef-migration-metrics.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox:latest
      command: ["wget"]
      args:
        - "--spider"
        - "--timeout=5"
        - 'http://{{ include "chef-migration-metrics.fullname" . }}:{{ .Values.service.port }}/api/v1/admin/status'
  restartPolicy: Never
