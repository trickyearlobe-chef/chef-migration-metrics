{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chef-migration-metrics.fullname" . }}
  labels:
    {{- include "chef-migration-metrics.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- $dbUrl := include "chef-migration-metrics.databaseUrl" . }}
  {{- if $dbUrl }}
  DATABASE_URL: {{ $dbUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.ldapBindPassword }}
  LDAP_BIND_PASSWORD: {{ .Values.secrets.ldapBindPassword | quote }}
  {{- end }}
{{- end }}
