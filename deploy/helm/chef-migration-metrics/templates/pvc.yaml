{{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "chef-migration-metrics.fullname" . }}
  labels:
    {{- include "chef-migration-metrics.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.persistence.accessModes | nindent 4 }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
{{- end }}
---
{{- if and (eq .Values.config.server.tls.mode "acme") (not .Values.acmeStorage.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "chef-migration-metrics.fullname" . }}-acme
  labels:
    {{- include "chef-migration-metrics.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.acmeStorage.accessModes | nindent 4 }}
  {{- if .Values.acmeStorage.storageClass }}
  storageClassName: {{ .Values.acmeStorage.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.acmeStorage.size }}
{{- end }}
