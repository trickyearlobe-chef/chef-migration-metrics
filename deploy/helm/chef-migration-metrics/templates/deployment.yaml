apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chef-migration-metrics.fullname" . }}
  labels:
    {{- include "chef-migration-metrics.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "chef-migration-metrics.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "chef-migration-metrics.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "chef-migration-metrics.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.chefWorkstation.enabled }}
      initContainers:
        - name: chef-workstation-tools
          image: "{{ .Values.chefWorkstation.image.repository }}:{{ .Values.chefWorkstation.image.tag }}"
          imagePullPolicy: {{ .Values.chefWorkstation.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Copying Chef Workstation binaries to shared tools volume..."
              mkdir -p /opt/chef-tools/bin

              # Chef Workstation omnibus installs binaries under /opt/chef-workstation/bin
              # and the embedded Ruby + gems under /opt/chef-workstation/embedded.
              # The tools (cookstyle, kitchen, inspec) are binstubs that need the
              # embedded Ruby tree to function, so we copy the entire embedded dir
              # alongside the requested binaries.
              {{- range .Values.chefWorkstation.binaries }}
              if [ -f "/opt/chef-workstation/bin/{{ . }}" ]; then
                cp -a "/opt/chef-workstation/bin/{{ . }}" /opt/chef-tools/bin/
                echo "  ✓ {{ . }}"
              else
                echo "  ✗ {{ . }} not found in /opt/chef-workstation/bin/" >&2
              fi
              {{- end }}

              # Copy the embedded Ruby environment that the binstubs depend on.
              # This includes the Ruby interpreter, gem libraries, and native extensions.
              if [ -d "/opt/chef-workstation/embedded" ]; then
                cp -a /opt/chef-workstation/embedded /opt/chef-tools/embedded
                echo "  ✓ embedded Ruby environment"
              else
                echo "  ✗ embedded directory not found" >&2
                exit 1
              fi

              # Patch binstubs to point at the copied embedded Ruby location.
              # Chef Workstation binstubs have a shebang like:
              #   #!/opt/chef-workstation/embedded/bin/ruby
              # We rewrite it to:
              #   #!/opt/chef-tools/embedded/bin/ruby
              for f in /opt/chef-tools/bin/*; do
                if head -1 "$f" | grep -q '/opt/chef-workstation/'; then
                  sed -i 's|/opt/chef-workstation/|/opt/chef-tools/|g' "$f"
                fi
              done

              echo "Chef Workstation tools ready."
          volumeMounts:
            - name: chef-tools
              mountPath: /opt/chef-tools
          {{- with .Values.chefWorkstation.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --config
            - /etc/chef-migration-metrics/config.yml
          ports:
            - name: http
              containerPort: {{ .Values.config.server.port }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret | default (include "chef-migration-metrics.fullname" .) }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/chef-migration-metrics/config.yml
              subPath: config.yml
              readOnly: true
            {{- if or .Values.chefKeys.existingSecret .Values.chefKeys.keys }}
            - name: chef-keys
              mountPath: /etc/chef-migration-metrics/keys
              readOnly: true
            {{- end }}
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /var/lib/chef-migration-metrics
            {{- end }}
            {{- if .Values.chefWorkstation.enabled }}
            - name: chef-tools
              mountPath: /opt/chef-tools
              readOnly: true
            {{- end }}
            {{- if and (eq .Values.config.server.tls.mode "static") (or .Values.tlsSecret.existingSecret .Values.tlsSecret.cert) }}
            - name: tls
              mountPath: /etc/chef-migration-metrics/tls
              readOnly: true
            {{- end }}
            {{- if eq .Values.config.server.tls.mode "acme" }}
            - name: acme-storage
              mountPath: {{ .Values.config.server.tls.acme.storage_path | default "/var/lib/chef-migration-metrics/acme" }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ .Values.existingConfigMap | default (include "chef-migration-metrics.fullname" .) }}
        {{- if .Values.chefWorkstation.enabled }}
        - name: chef-tools
          emptyDir: {}
        {{- end }}
        {{- if .Values.chefKeys.existingSecret }}
        - name: chef-keys
          secret:
            secretName: {{ .Values.chefKeys.existingSecret }}
            defaultMode: 0400
        {{- else if .Values.chefKeys.keys }}
        - name: chef-keys
          secret:
            secretName: {{ include "chef-migration-metrics.fullname" . }}-chef-keys
            defaultMode: 0400
        {{- end }}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (include "chef-migration-metrics.fullname" .) }}
        {{- end }}
        {{- if and (eq .Values.config.server.tls.mode "static") .Values.tlsSecret.existingSecret }}
        - name: tls
          secret:
            secretName: {{ .Values.tlsSecret.existingSecret }}
            defaultMode: 0400
        {{- else if and (eq .Values.config.server.tls.mode "static") .Values.tlsSecret.cert }}
        - name: tls
          secret:
            secretName: {{ include "chef-migration-metrics.fullname" . }}-tls
            defaultMode: 0400
        {{- end }}
        {{- if eq .Values.config.server.tls.mode "acme" }}
        - name: acme-storage
          persistentVolumeClaim:
            claimName: {{ .Values.acmeStorage.existingClaim | default (printf "%s-acme" (include "chef-migration-metrics.fullname" .)) }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
