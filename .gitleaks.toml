# =============================================================================
# Gitleaks Configuration — Secret Scanning
# =============================================================================
# Used by the CI pipeline (GitHub Actions) and can be run locally:
#   gitleaks detect --config .gitleaks.toml --source .
#
# See https://github.com/gitleaks/gitleaks for documentation.
# =============================================================================

title = "chef-migration-metrics gitleaks config"

# ---------------------------------------------------------------------------
# Custom rules — project-specific credential patterns
# ---------------------------------------------------------------------------

[[rules]]
id = "pem-private-key"
description = "PEM-encoded private key (RSA, DSA, EC, OpenSSH)"
regex = '''-----BEGIN (RSA |DSA |EC |OPENSSH )?PRIVATE KEY-----'''
tags = ["key", "pem"]

[[rules]]
id = "cmm-master-key"
description = "Chef Migration Metrics master encryption key with a value"
regex = '''CMM_CREDENTIAL_ENCRYPTION_KEY\s*=\s*[^\s]{8,}'''
tags = ["credential", "encryption"]

[[rules]]
id = "aws-access-key-id"
description = "AWS Access Key ID"
regex = '''AKIA[0-9A-Z]{16}'''
tags = ["aws", "key"]

[[rules]]
id = "aws-secret-access-key"
description = "AWS Secret Access Key assignment"
regex = '''(?i)(aws_secret_access_key|aws_secret_key)\s*[=:]\s*\S+'''
tags = ["aws", "secret"]

[[rules]]
id = "github-pat"
description = "GitHub personal access token"
regex = '''ghp_[0-9a-zA-Z]{36}'''
tags = ["github", "token"]

[[rules]]
id = "github-oauth"
description = "GitHub OAuth token"
regex = '''gho_[0-9a-zA-Z]{36}'''
tags = ["github", "token"]

[[rules]]
id = "github-server-token"
description = "GitHub server-to-server token"
regex = '''ghs_[0-9a-zA-Z]{36}'''
tags = ["github", "token"]

[[rules]]
id = "github-user-token"
description = "GitHub user-to-server token"
regex = '''ghu_[0-9a-zA-Z]{36}'''
tags = ["github", "token"]

[[rules]]
id = "github-fine-grained-pat"
description = "GitHub fine-grained personal access token"
regex = '''github_pat_[0-9a-zA-Z_]{22,}'''
tags = ["github", "token"]

[[rules]]
id = "openai-stripe-secret"
description = "OpenAI or Stripe secret key"
regex = '''sk-[0-9a-zA-Z]{20,}'''
tags = ["api", "secret"]

[[rules]]
id = "sendgrid-api-key"
description = "SendGrid API key"
regex = '''SG\.[0-9A-Za-z_-]{22}\.[0-9A-Za-z_-]{43}'''
tags = ["sendgrid", "api"]

[[rules]]
id = "slack-token"
description = "Slack token"
regex = '''xox[bpras]-[0-9a-zA-Z-]{10,}'''
tags = ["slack", "token"]

[[rules]]
id = "generic-password-assignment"
description = "Possible hardcoded password or secret in assignment"
regex = '''(?i)(password|passwd|secret|api_key|apikey|api_secret)\s*[=:]\s*["'][^\s"']{8,}["']'''
tags = ["credential", "password"]
entropy = 3.5

[[rules]]
id = "database-url-with-password"
description = "Database connection string with embedded password"
regex = '''(?i)(postgres|mysql|mongodb|redis)://[^:]+:[^@\s]{8,}@'''
tags = ["database", "credential"]

# ---------------------------------------------------------------------------
# Allowlist — paths and patterns that are safe to ignore
# ---------------------------------------------------------------------------

[allowlist]
description = "Global allowlist for non-secret matches"

# Files that document secret patterns without containing real secrets
paths = [
  '''\.gitleaks\.toml$''',
  '''\.githooks/pre-commit$''',
  '''\.claude/specifications/.*\.md$''',
  '''\.claude/Claude\.md$''',
  '''\.claude/summaries/.*\.md$''',
  '''\.claude/Structure\.md$''',
  '''\.github/workflows/.*\.yml$''',
  '''deploy/docker-compose/\.env\.example$''',
  '''deploy/elk/\.env\.example$''',
  '''deploy/docker-compose/README\.md$''',
  '''deploy/elk/README\.md$''',
  '''README\.md$''',
  '''HANDLER_PROGRESS\.md$''',
  '''go\.sum$''',
  '''frontend/package-lock\.json$''',
]

# Regex patterns in content that are known false positives
regexes = [
  # Test fixtures using obviously fake keys and tokens
  '''(?i)EXAMPLE|PLACEHOLDER|CHANGEME|REPLACE_ME|YOUR_.*_HERE|TODO|FIXME''',
  # Go test files often contain test key material
  '''_test\.go$''',
]
